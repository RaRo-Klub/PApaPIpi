<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakLoop — Türkçe</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f5f0;color:#1c1a15;font-family:'Outfit','Noto Sans JP',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}input{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fade{animation:fadeUp .25s ease both}.pulsing{animation:blink .9s ease-in-out infinite}
#header{background:#fff;border-bottom:1.5px solid #e2e0db;padding:0 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;min-height:56px;position:sticky;top:0;z-index:50}
#logo{font-weight:900;font-size:1.15rem;letter-spacing:-.04em}
.lang-toggle{display:flex;background:#f0ede8;border:1.5px solid #e2e0db;border-radius:100px;padding:3px;gap:2px;margin-left:auto}
.lang-btn{padding:.28rem .85rem;border-radius:100px;border:none;font-weight:700;font-size:.8rem;background:transparent;color:#7a7060;transition:all .18s}
.stat{background:#f0ede8;border:1.5px solid #e2e0db;border-radius:7px;padding:.2rem .5rem;font-weight:700;font-size:.76rem}
#main{max-width:640px;margin:0 auto;padding:1.2rem 1rem 4rem}
#tabs{display:flex;gap:3px;background:#fff;border:1.5px solid #e2e0db;border-radius:12px;padding:4px;width:fit-content;margin-bottom:1.2rem}
.tab{padding:.42rem .95rem;border-radius:9px;border:none;font-weight:700;font-size:.82rem;background:transparent;color:#7a7060;transition:all .18s}
.tab.active{background:#1c1a15;color:#f7f5f0}
.view{display:none}.view.active{display:block}
.card{background:#fff;border:1.5px solid #e2e0db;border-radius:15px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.cat-tag{font-size:.67rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:.18rem .6rem;border-radius:100px}
.btn{padding:.52rem 1.05rem;border-radius:10px;font-weight:600;font-size:.83rem;border:1.5px solid #e2e0db;background:transparent;color:#1c1a15;transition:opacity .15s}
.btn.primary{border:none;color:#fff}.btn:hover{opacity:.82}
#record-area{background:#fff;border:1.5px dashed #ccc;border-radius:15px;padding:1.5rem 1.2rem;text-align:center;margin-bottom:1rem;transition:all .25s}
#wave{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:48px;margin-bottom:1rem;opacity:.1;transition:opacity .3s}
.bar{width:6px;border-radius:3px;transition:height .06s ease}
#mic-btn{width:66px;height:66px;border-radius:50%;border:none;color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;cursor:pointer;transition:all .2s}
#transcript-box{background:#f7f5f0;border:1.5px solid #e2e0db;border-radius:12px;padding:.8rem 1.1rem;margin-bottom:.9rem;display:none}
#transcript-box.show{display:block}
.box-label{font-size:.63rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:.28rem}
#score-panel{background:#fff;border:1.5px solid #e2e0db;border-radius:15px;padding:1.1rem 1.3rem;display:none;align-items:center;gap:1.1rem;margin-bottom:1rem}
#score-panel.show{display:flex}
.word-ok{color:#16a34a;font-weight:700}.word-miss{color:#dc2626;text-decoration:line-through}
#flashcard{background:#fff;border:1.5px solid #e2e0db;border-radius:20px;padding:2.6rem 1.8rem;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;margin-bottom:1rem;position:relative}
.fc-badge{position:absolute;top:.9rem;left:1.2rem;font-size:.63rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.16rem .55rem;border-radius:100px}
#fc-hint{position:absolute;bottom:.75rem;right:1.1rem;font-size:.65rem;color:#ccc}
#fc-nav{display:flex;gap:.55rem;justify-content:center;margin-bottom:.7rem}
#fc-progress{text-align:center;font-size:.76rem;color:#bbb}
#prog-bar{background:#e2e0db;border-radius:100px;height:7px;margin-bottom:.42rem;overflow:hidden}
#prog-fill{height:100%;border-radius:100px;transition:width .5s}
#prog-label{font-size:.74rem;color:#bbb;margin-bottom:1.3rem}
#add-form{background:#fff;border:1.5px solid #e2e0db;border-radius:13px;padding:1.1rem 1.3rem;margin-bottom:1.1rem}
#add-form h3{font-weight:700;font-size:.86rem;margin-bottom:.75rem}
#add-row{display:flex;gap:.48rem;flex-wrap:wrap}
.finput{flex:1;min-width:90px;background:#f7f5f0;border:1.5px solid #e2e0db;border-radius:9px;padding:.52rem .75rem;font-size:.82rem;color:#1c1a15;outline:none}
#pl-grid{display:flex;flex-direction:column;gap:.4rem}
.pl-item{background:#fff;border:1.5px solid #e2e0db;border-radius:11px;padding:.78rem .95rem;display:flex;align-items:center;gap:.7rem;cursor:pointer;transition:all .15s}
.pl-n{font-size:.68rem;color:#ccc;font-weight:700;width:18px;flex-shrink:0}
.pl-texts{flex:1;min-width:0}
.pl-en{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-ja{font-size:.73rem;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-check{width:19px;height:19px;border-radius:50%;background:#e2e0db;display:flex;align-items:center;justify-content:center;font-size:.62rem;color:#fff;font-weight:800;flex-shrink:0}
.pl-check.done{background:#16a34a}
.pl-del{background:none;border:none;color:#ccc;font-size:.88rem;cursor:pointer;padding:.12rem .32rem;border-radius:5px;flex-shrink:0}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);color:#fff;border-radius:11px;padding:.75rem 1.2rem;font-size:.84rem;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;display:none;white-space:nowrap;animation:toastIn .26s ease both}
#toast.show{display:block}

/* Turkish special characters reminder */
.tr-chars{background:#fff8f0;border:1.5px solid #fed7aa;border-radius:11px;padding:.7rem 1rem;margin-bottom:1rem;font-size:.76rem;color:#92400e;line-height:1.6}
.tr-chars strong{color:#c2410c;font-size:.7rem;letter-spacing:.05em}
</style>
</head>
<body>
<div id="header">
  <div id="logo"></div>
  <div class="lang-toggle">
    <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">🇹🇷 TR</button>
    <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">🇯🇵 JA</button>
  </div>
  <div style="display:flex;gap:.35rem">
    <span class="stat" id="h-done"></span>
    <span class="stat" id="h-streak"></span>
  </div>
</div>
<div id="main">
  <div id="tabs">
    <button class="tab active" id="tab-practice" onclick="switchTab('practice',this)">🎙️ 練習</button>
    <button class="tab" id="tab-flash" onclick="switchTab('flash',this)">🃏 暗記</button>
    <button class="tab" id="tab-manage" onclick="switchTab('manage',this)">📋 一覧</button>
  </div>
  <div class="view active" id="view-practice">
    <div class="card" id="phrase-card" style="border-left-width:4px;border-left-style:solid">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem">
        <span class="cat-tag" id="cat-tag"></span>
        <span id="phrase-num" style="margin-left:auto;font-size:.7rem;color:#bbb"></span>
      </div>
      <div id="phrase-target" style="font-size:1.45rem;font-weight:800;line-height:1.38;letter-spacing:-.01em;margin-bottom:.5rem"></div>
      <div id="phrase-sub" style="font-size:.86rem;color:#999;margin-bottom:1.1rem;line-height:1.6"></div>
      <div id="phrase-romaji" style="font-size:.76rem;color:#bbb;margin-bottom:1rem;line-height:1.5;display:none"></div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn primary" id="btn-listen" onclick="playTTS()">🔊 聴く</button>
        <button class="btn" onclick="nextPhrase()">→ 次へ</button>
        <button class="btn" onclick="shufflePhrase()">🔀</button>
        <button class="btn" id="btn-romaji" onclick="toggleRomaji()" style="font-size:.75rem">ローマ字</button>
      </div>
    </div>
    <div id="record-area">
      <div id="wave"></div>
      <button id="mic-btn" onclick="toggleRec()">🎙️</button>
      <div id="rec-status" style="font-weight:700;font-size:.86rem;margin-bottom:.2rem;color:#bbb"></div>
      <div id="rec-hint" style="font-size:.73rem;color:#ccc"></div>
    </div>
    <div id="transcript-box">
      <div class="box-label">認識結果 / Tanınan</div>
      <div id="transcript-text" style="font-size:.95rem;line-height:1.65"></div>
    </div>
    <div id="text-fallback" style="margin-bottom:1rem">
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:.4rem">またはテキストで入力 / Veya metin girin</div>
      <div style="display:flex;gap:.5rem">
        <input id="text-input" class="finput" placeholder="ここに入力してEnter / Buraya yazın" style="flex:1" onkeydown="if(event.key==='Enter')submitText()"/>
        <button class="btn primary" id="text-submit-btn" onclick="submitText()" style="flex-shrink:0">✓ 確認</button>
      </div>
    </div>
    <div id="score-panel">
      <svg width="64" height="64" viewBox="0 0 64 64" style="flex-shrink:0;transform:rotate(-90deg)">
        <circle cx="32" cy="32" r="28" fill="none" stroke="#eee" stroke-width="6"/>
        <circle id="score-arc" cx="32" cy="32" r="28" fill="none" stroke="#16a34a" stroke-width="6"
          stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round"
          style="transition:stroke-dashoffset .8s ease"/>
        <text id="score-num" x="32" y="32" text-anchor="middle" dominant-baseline="central"
          style="transform:rotate(90deg);transform-origin:32px 32px"
          fill="#1c1a15" font-size="10" font-weight="800">0%</text>
      </svg>
      <div style="flex:1">
        <div id="score-title" style="font-weight:800;font-size:.95rem;margin-bottom:.3rem"></div>
        <div id="score-detail" style="font-size:.75rem;color:#bbb;margin-bottom:.35rem"></div>
        <div id="score-words" style="font-size:.83rem;line-height:2;display:flex;flex-wrap:wrap;gap:.2rem"></div>
      </div>
    </div>
  </div>

  <div class="view" id="view-flash">
    <div id="flashcard" onclick="flipCard()">
      <span class="fc-badge" id="fc-badge"></span>
      <div id="fc-word" style="font-size:1.6rem;font-weight:800;line-height:1.38;margin-bottom:.55rem"></div>
      <div id="fc-sub" style="font-size:.86rem;color:#ccc;transition:color .2s;line-height:1.6"></div>
      <div id="fc-hint">tap ↺</div>
    </div>
    <div id="fc-nav">
      <button class="btn" onclick="fcMove(-1)">← 前へ</button>
      <button class="btn primary" id="fc-listen" onclick="fcPlayTTS()">🔊 聴く</button>
      <button class="btn" onclick="fcMove(1)">次へ →</button>
    </div>
    <div id="fc-progress"></div>
  </div>

  <div class="view" id="view-manage">
    <div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
    <div id="prog-label"></div>
    <div class="tr-chars">
      <strong>🇹🇷 トルコ語特殊文字：</strong><br>
      <b>ç</b> (ch) &nbsp; <b>ğ</b> (伸ばすg) &nbsp; <b>ı</b> (ウ・イ中間) &nbsp; <b>İ</b> (大文字I) &nbsp; <b>ö</b> (ウェ) &nbsp; <b>ş</b> (sh) &nbsp; <b>ü</b> (ユ)
    </div>
    <div id="add-form">
      <h3>＋ フレーズを追加</h3>
      <div id="add-row">
        <input class="finput" id="add-tr" placeholder="Türkçe (トルコ語)" style="max-width:220px"/>
        <input class="finput" id="add-ja" placeholder="日本語訳" style="max-width:180px"/>
        <input class="finput" id="add-cat" placeholder="カテゴリ" style="max-width:110px"/>
        <button class="btn primary" id="add-btn" onclick="addPhrase()">追加</button>
      </div>
    </div>
    <div id="pl-grid"></div>
  </div>
</div>
<div id="toast"></div>
<script>
var lang='tr', curIdx=0, fcIdx=0, fcFlipped=false, done=[], isRec=false, recObj=null, rafId=null, toastTimer=null, romajiVisible=false;

var phrases=[
  {tr:"Merhaba! Nasılsınız?",ja:"こんにちは！お元気ですか？",rom:"Mer-ha-ba! Na-sıl-sı-nız?",cat:"挨拶"},
  {tr:"İyiyim, teşekkür ederim.",ja:"元気です、ありがとうございます。",rom:"İ-yi-yim, te-şek-kür e-de-rim.",cat:"挨拶"},
  {tr:"Benim adım...",ja:"私の名前は…",rom:"Be-nim a-dım...",cat:"自己紹介"},
  {tr:"Memnun oldum.",ja:"はじめまして。",rom:"Mem-nun ol-dum.",cat:"挨拶"},
  {tr:"Türkçe bilmiyorum.",ja:"私はトルコ語が分かりません。",rom:"Türk-çe bil-mi-yo-rum.",cat:"言語"},
  {tr:"Daha yavaş konuşabilir misiniz?",ja:"もう少しゆっくり話してもらえますか？",rom:"Da-ha ya-vaş ko-nu-şa-bi-lir mi-si-niz?",cat:"言語"},
  {tr:"Anlamadım, tekrar eder misiniz?",ja:"分かりませんでした、もう一度言ってもらえますか？",rom:"An-la-ma-dım, tek-rar e-der mi-si-niz?",cat:"言語"},
  {tr:"Teşekkür ederim.",ja:"ありがとうございます。",rom:"Te-şek-kür e-de-rim.",cat:"礼儀"},
  {tr:"Rica ederim.",ja:"どういたしまして。",rom:"Ri-ca e-de-rim.",cat:"礼儀"},
  {tr:"Lütfen.",ja:"お願いします。",rom:"Lüt-fen.",cat:"礼儀"},
  {tr:"Özür dilerim.",ja:"すみません。",rom:"Ö-zür di-le-rim.",cat:"礼儀"},
  {tr:"Evet / Hayır",ja:"はい / いいえ",rom:"E-vet / Ha-yır",cat:"基本"},
  {tr:"Bu ne kadar?",ja:"これはいくらですか？",rom:"Bu ne ka-dar?",cat:"買い物"},
  {tr:"Çok güzel!",ja:"とても美しい！素晴らしい！",rom:"Çok gü-zel!",cat:"感想"},
  {tr:"Aferin!",ja:"よくできました！すごい！",rom:"A-fe-rin!",cat:"感想"},
  {tr:"Nerede...?",ja:"…はどこですか？",rom:"Ne-re-de...?",cat:"場所"},
  {tr:"Bir çay lütfen.",ja:"お茶を一つお願いします。",rom:"Bir çay lüt-fen.",cat:"飲食"},
  {tr:"Hesap lütfen.",ja:"お会計をお願いします。",rom:"He-sap lüt-fen.",cat:"飲食"},
  {tr:"İyi geceler!",ja:"おやすみなさい！",rom:"İ-yi ge-ce-ler!",cat:"挨拶"},
  {tr:"Görüşürüz!",ja:"またね！",rom:"Gö-rü-şü-rüz!",cat:"挨拶"},
  {tr:"Seni seviyorum.",ja:"あなたを愛しています。",rom:"Se-ni se-vi-yo-rum.",cat:"気持ち"},
  {tr:"Harika bir gün!",ja:"素晴らしい一日！",rom:"Ha-ri-ka bir gün!",cat:"感想"},
  {tr:"Türkiye çok güzel bir ülke.",ja:"トルコはとても美しい国です。",rom:"Tür-ki-ye çok gü-zel bir ül-ke.",cat:"会話"},
  {tr:"İstanbul'a gitmek istiyorum.",ja:"イスタンブールに行きたいです。",rom:"İs-tan-bul-a git-mek is-ti-yo-rum.",cat:"旅行"},
  {tr:"Yardım eder misiniz?",ja:"手伝ってもらえますか？",rom:"Yar-dım e-der mi-si-niz?",cat:"依頼"},
];

function isDone(i){return done.indexOf(i)>=0;}
function getTarget(p){return lang==='tr'?p.tr:p.ja;}
function getSub(p){return lang==='tr'?p.ja:p.tr;}
function acc(){return '#c0392b';}
function accL(){return '#fef2f0';}
function accM(){return '#e74c3c';}
function g(id){return document.getElementById(id);}

function init(){
  updateLangUI();
  renderPhrase(0);
  renderFlash(0);
  updateHeader();
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  }
}

function updateLangUI(){
  var a=acc(),al=accL();
  g('btn-tr').style.background=lang==='tr'?a:'transparent';
  g('btn-tr').style.color=lang==='tr'?'#fff':'#7a7060';
  g('btn-ja').style.background=lang==='ja'?'#1d4ed8':'transparent';
  g('btn-ja').style.color=lang==='ja'?'#fff':'#7a7060';
  g('logo').innerHTML='<span style="color:'+a+'">Speak</span><span style="color:#ddd;font-weight:300">/</span><span style="color:#1d4ed8">話す</span>Loop 🇹🇷';
  g('btn-listen').style.background=a;
  g('fc-listen').style.background=a;
  g('add-btn').style.background=a;
  if(g('text-submit-btn'))g('text-submit-btn').style.background=a;
  g('prog-fill').style.background='linear-gradient(90deg,'+a+','+accM()+')';
  g('rec-status').textContent=lang==='tr'?'🎙️ タップして録音':'🎙️ をタップして録音';
  g('rec-hint').textContent=lang==='tr'?'トルコ語でハッキリ話してください':'日本語でハッキリ話してください';
  g('mic-btn').style.background=a;
  g('mic-btn').style.boxShadow='0 5px 16px '+a+'55';
}

function setLang(l){
  lang=l;
  updateLangUI();
  resetRec();
  romajiVisible=false;
  g('phrase-romaji').style.display='none';
  renderPhrase(curIdx);
  renderFlash(fcIdx);
  renderManage();
}

function updateHeader(){
  var s=0;
  for(var i=0;i<phrases.length;i++){if(isDone(i))s++;else break;}
  g('h-done').textContent='✅ '+done.length+'/'+phrases.length;
  g('h-streak').textContent='🔥 '+s;
}

function renderPhrase(idx){
  curIdx=((idx%phrases.length)+phrases.length)%phrases.length;
  var p=phrases[curIdx],a=acc(),al=accL();
  g('phrase-card').style.borderLeftColor=a;
  var ct=g('cat-tag');
  ct.textContent=p.cat;ct.style.background=al;ct.style.color=a;
  g('phrase-num').textContent='#'+(curIdx+1)+'/'+phrases.length;
  g('phrase-target').textContent=getTarget(p);
  g('phrase-sub').textContent=getSub(p);
  g('phrase-romaji').textContent='📖 '+p.rom;
  if(romajiVisible&&lang==='tr'){g('phrase-romaji').style.display='block';}
  else{g('phrase-romaji').style.display='none';}
  resetRec();
}

function toggleRomaji(){
  romajiVisible=!romajiVisible;
  if(lang==='tr'){
    g('phrase-romaji').style.display=romajiVisible?'block':'none';
  }
  g('btn-romaji').style.background=romajiVisible?acc():'transparent';
  g('btn-romaji').style.color=romajiVisible?'#fff':'#1c1a15';
}

function nextPhrase(){renderPhrase(curIdx+1);}
function shufflePhrase(){var r;do{r=Math.floor(Math.random()*phrases.length);}while(r===curIdx&&phrases.length>1);renderPhrase(r);}

function resetRec(){
  if(isRec&&recObj)recObj.stop();
  g('transcript-box').className='';
  g('score-panel').className='';
  g('record-area').style.borderStyle='dashed';
  g('record-area').style.borderColor='#ccc';
  g('record-area').style.background='#fff';
  var a=acc();
  g('mic-btn').className='';
  g('mic-btn').style.background=a;
  g('mic-btn').style.boxShadow='0 5px 16px '+a+'55';
  g('mic-btn').textContent='🎙️';
  g('rec-status').style.color='#bbb';
  g('rec-status').textContent='🎙️ をタップして録音';
  g('wave').style.opacity='.1';
  cancelAnimationFrame(rafId);
  isRec=false;
}

function playTTS(){speakText(getTarget(phrases[curIdx]));}
function fcPlayTTS(){speakText(getTarget(phrases[fcIdx]));}
function speakText(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='tr'?'tr-TR':'ja-JP';
  u.rate=.82;
  var vs=window.speechSynthesis.getVoices(),prefix=lang==='tr'?'tr':'ja',v=null;
  for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf(prefix)===0&&vs[i].localService){v=vs[i];break;}}
  if(!v){for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf(prefix)===0){v=vs[i];break;}}}
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

function stopRecUI(){
  isRec=false;
  cancelAnimationFrame(rafId);
  var a=acc();
  g('mic-btn').className='';
  g('mic-btn').style.background=a;
  g('mic-btn').style.boxShadow='0 5px 16px '+a+'55';
  g('mic-btn').textContent='🎙️';
  g('rec-status').style.color='#bbb';
  g('rec-status').textContent='もう一度タップ';
  g('record-area').style.borderStyle='dashed';
  g('record-area').style.borderColor='#ccc';
  g('record-area').style.background='#fff';
  g('wave').style.opacity='.1';
}

function toggleRec(){
  if(isRec){if(recObj)recObj.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Chromeをお使いください',true);return;}
  var capturedIdx=curIdx,capturedLang=lang;
  var a=acc(),al=accL();
  var rec=new SR();recObj=rec;
  rec.lang=lang==='tr'?'tr-TR':'ja-JP';
  rec.continuous=false;rec.interimResults=true;
  rec.onstart=function(){
    isRec=true;
    g('transcript-box').className='';g('score-panel').className='';g('transcript-text').textContent='';
    g('mic-btn').className='pulsing';g('mic-btn').style.background='#dc2626';g('mic-btn').style.boxShadow='0 5px 16px #dc262660';g('mic-btn').textContent='⏹';
    g('rec-status').style.color=a;g('rec-status').textContent='録音中… ⏹で停止';
    g('record-area').style.borderStyle='solid';g('record-area').style.borderColor=a;g('record-area').style.background=al;
    g('wave').style.opacity='1';
    var waveEl=g('wave');waveEl.innerHTML='';
    var NUM=28,bars=[];
    for(var i=0;i<NUM;i++){var b=document.createElement('div');b.className='bar';b.style.background='linear-gradient(to top,'+a+','+accM()+')';b.style.height='3px';waveEl.appendChild(b);bars.push(b);}
    var t=0;
    function tick(){rafId=requestAnimationFrame(tick);t+=0.15;for(var i=0;i<NUM;i++){var h=Math.max(3,Math.abs(Math.sin(t+i*0.4))*40+Math.random()*8);bars[i].style.height=h+'px';}}
    tick();
  };
  rec.onresult=function(e){
    var t='';for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    g('transcript-text').textContent=t;g('transcript-box').className='show';
    if(e.results[e.results.length-1].isFinal)evaluate(t,capturedIdx,capturedLang);
  };
  rec.onerror=function(e){
    stopRecUI();
    if(e.error==='not-allowed')showToast('マイクのアクセスを許可してください',true);
    else if(e.error!=='no-speech')showToast('エラー: '+e.error,true);
  };
  rec.onend=stopRecUI;
  try{rec.start();}catch(e){stopRecUI();showToast('録音を開始できませんでした',true);}
}

function submitText(){
  var val=g('text-input').value.trim();
  if(!val){showToast('テキストを入力してください',true);return;}
  g('transcript-text').textContent=val;g('transcript-box').className='show';
  evaluate(val,curIdx,lang);
  g('text-input').value='';
}

function evaluate(text,pIdx,pLang){
  var p=phrases[pIdx];if(!p)return;
  var target=(pLang==='tr'?p.tr:p.ja).toLowerCase().replace(/[^\p{L}\s]/gu,'');
  var spoken=text.toLowerCase().replace(/[^\p{L}\s]/gu,'');
  var tw=target.split(/\s+/).filter(Boolean);
  var sw=spoken.split(/\s+/).filter(Boolean);
  var matched=0;
  var words=tw.map(function(w){var hit=sw.indexOf(w)>=0;if(hit)matched++;return{w:w,hit:hit};});
  var pct=tw.length?Math.round(matched/tw.length*100):0;
  g('score-panel').className='show';
  var circ=175.9,arc=g('score-arc');
  arc.setAttribute('stroke-dashoffset',String(circ-circ*pct/100));
  arc.setAttribute('stroke',pct>=75?'#16a34a':pct>=50?'#d97706':'#dc2626');
  g('score-num').textContent=pct+'%';
  g('score-title').textContent=pct===100?'🎉 Mükemmel!':pct>=75?'✅ Harika!':pct>=50?'💪 Devam et!':'🔄 Tekrar dene!';
  g('score-detail').textContent=matched+'/'+tw.length+' 語一致';
  var sw_el=g('score-words');sw_el.innerHTML='';
  words.forEach(function(wd){var sp=document.createElement('span');sp.textContent=wd.w;sp.className=wd.hit?'word-ok':'word-miss';sw_el.appendChild(sp);});
  if(pct>=75){if(!isDone(pIdx))done.push(pIdx);updateHeader();renderManage();showToast(pct===100?'🎉 Mükemmel！':'✅ Harika！');}
  else{showToast(pct>=50?'💪 もう一度！':'🔄 練習を続けよう！');}
}

function renderFlash(idx){
  fcIdx=((idx%phrases.length)+phrases.length)%phrases.length;fcFlipped=false;
  var p=phrases[fcIdx],a=acc(),al=accL();
  var fc=g('flashcard');fc.style.background='#fff';fc.style.borderColor='#e2e0db';
  var badge=g('fc-badge');badge.textContent=lang==='tr'?'TR':'JA';badge.style.background=al;badge.style.color=a;
  var fw=g('fc-word');fw.textContent=getTarget(p);fw.style.fontSize='1.45rem';
  var fs=g('fc-sub');fs.textContent='タップして翻訳を表示';fs.style.color='#ccc';
  g('fc-progress').textContent=(fcIdx+1)+' / '+phrases.length;
}

function flipCard(){
  fcFlipped=!fcFlipped;var p=phrases[fcIdx],a=acc(),al=accL(),fc=g('flashcard'),fs=g('fc-sub');
  if(fcFlipped){
    fc.style.background=al;fc.style.borderColor=a;
    fs.textContent=getSub(p)+(lang==='tr'&&p.rom?'\n📖 '+p.rom:'');
    fs.style.color='#333';
  } else {
    fc.style.background='#fff';fc.style.borderColor='#e2e0db';
    fs.textContent='タップして翻訳を表示';fs.style.color='#ccc';
  }
}
function fcMove(d){renderFlash(fcIdx+d);}

function renderManage(){
  var pct=phrases.length?Math.round(done.length/phrases.length*100):0;
  g('prog-fill').style.width=pct+'%';
  g('prog-label').textContent=done.length+' / '+phrases.length+' フレーズ練習済み';
  var grid=g('pl-grid');grid.innerHTML='';
  var a=acc(),al=accL();
  phrases.forEach(function(p,i){
    var div=document.createElement('div');div.className='pl-item';
    if(i===curIdx){div.style.borderColor=a;div.style.background=al;}
    div.innerHTML='<span class="pl-n">'+(i+1)+'</span><div class="pl-texts"><div class="pl-en">'+escHtml(p.tr)+'</div><div class="pl-ja">'+escHtml(p.ja)+'</div></div><div class="pl-check'+(isDone(i)?' done':'')+'">'+( isDone(i)?'✓':'')+'</div><button class="pl-del" data-i="'+i+'">✕</button>';
    div.querySelector('.pl-del').addEventListener('click',function(e){e.stopPropagation();delPhrase(parseInt(this.getAttribute('data-i')));});
    div.addEventListener('click',function(){renderPhrase(i);switchTab('practice',g('tab-practice'));});
    grid.appendChild(div);
  });
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addPhrase(){
  var tr=g('add-tr').value.trim(),ja=g('add-ja').value.trim(),cat=g('add-cat').value.trim()||'カスタム';
  if(!tr&&!ja){showToast('フレーズを入力してください',true);return;}
  phrases.push({tr:tr||'(no TR)',ja:ja||'(日本語なし)',rom:'',cat:cat});
  g('add-tr').value='';g('add-ja').value='';g('add-cat').value='';
  updateHeader();renderManage();showToast('✨ 追加しました！');
}
function delPhrase(i){
  phrases.splice(i,1);
  done=done.filter(function(d){return d!==i;}).map(function(d){return d>i?d-1:d;});
  if(curIdx>=phrases.length)curIdx=Math.max(0,phrases.length-1);
  updateHeader();renderManage();renderPhrase(curIdx);
}
function switchTab(v,btn){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});
  g('view-'+v).classList.add('active');if(btn)btn.classList.add('active');
  if(v==='manage')renderManage();
}
function showToast(msg,err){
  var t=g('toast');t.textContent=msg;t.style.background=err?'#b91c1c':'#1c1a15';t.className='show';
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.className='';},3000);
}
init();
</script>
</body>
</html>
