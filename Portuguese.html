<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Falar Português</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --accent: #e8a045;
    --accent2: #5ba4a4;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: #30363d;
    --correct: #3fb950;
    --wrong: #f85149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { font-style: italic; color: var(--accent2); }

  .progress-ring {
    position: relative;
    width: 44px;
    height: 44px;
  }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring circle {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .progress-ring .fill {
    stroke: var(--accent);
    stroke-dasharray: 113;
    stroke-dashoffset: 113;
    transition: stroke-dashoffset .5s ease;
  }
  .progress-ring .count {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
  }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 14px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
  }

  .view { display: none; padding: 20px; }
  .view.active { display: block; }

  .card-area {
    perspective: 1200px;
    height: 260px;
    margin-bottom: 24px;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .flashcard.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    border: 1px solid var(--border);
  }

  .face.front {
    background: linear-gradient(145deg, var(--card) 0%, #1a2535 100%);
  }
  .face.back {
    background: linear-gradient(145deg, #1a2a1a 0%, #1c2a24 100%);
    transform: rotateY(180deg);
    border-color: #2d4030;
  }

  .category-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    background: rgba(91,164,164,.1);
    padding: 4px 10px;
    border-radius: 10px;
  }

  .phrase-pt {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    text-align: center;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .phrase-romanji {
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }

  .phrase-jp {
    font-size: 22px;
    text-align: center;
    color: var(--correct);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .example {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    padding: 10px 16px;
    background: rgba(255,255,255,.04);
    border-radius: 10px;
    width: 100%;
  }

  .tap-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
    opacity: .6;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(.96); opacity: .85; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
  }

  .quiz-question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 20px;
  }

  .quiz-question .phrase-pt { font-size: 24px; margin-bottom: 6px; }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice {
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    transition: all .18s;
  }
  .choice:active { transform: scale(.98); }
  .choice.correct { border-color: var(--correct); background: rgba(63,185,80,.12); color: var(--correct); }
  .choice.wrong { border-color: var(--wrong); background: rgba(248,81,73,.12); color: var(--wrong); }

  .quiz-result {
    text-align: center;
    padding: 24px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .quiz-result .score {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    color: var(--accent);
  }
  .quiz-result p { color: var(--muted); font-size: 14px; margin-top: 6px; }

  .phrase-list { display: flex; flex-direction: column; gap: 10px; }

  .phrase-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .phrase-item .left { flex: 1; min-width: 0; }
  .phrase-item .pt { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); margin-bottom: 2px; }
  .phrase-item .jp { font-size: 13px; color: var(--muted); }

  .star-btn {
    background: transparent;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }
  .starred { color: var(--accent); }
  .unstarred { color: var(--border); }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .streak-banner {
    background: linear-gradient(135deg, rgba(232,160,69,.15), rgba(91,164,164,.1));
    border: 1px solid rgba(232,160,69,.3);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .streak-banner .flame { font-size: 28px; }
  .streak-banner .info strong { font-size: 15px; color: var(--accent); }
  .streak-banner .info p { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Falar <span>Português</span></div>
  <div class="progress-ring">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="18"/>
      <circle class="fill" cx="22" cy="22" r="18"/>
    </svg>
    <div class="count" id="progressCount">0%</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('flash')">🃏 カード</button>
  <button class="tab" onclick="switchTab('quiz')">🧠 クイズ</button>
  <button class="tab" onclick="switchTab('list')">📋 一覧</button>
</div>

<!-- FLASHCARD VIEW -->
<div class="view active" id="view-flash">
  <div style="height:14px"></div>
  <div class="streak-banner">
    <div class="flame">🔥</div>
    <div class="info">
      <strong id="streakCount">0 連続正解</strong>
      <p>カードをタップして裏返そう！</p>
    </div>
  </div>

  <div class="card-area">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="face front">
        <div class="category-tag" id="cardCategory">あいさつ</div>
        <div class="phrase-pt" id="cardPt">Olá</div>
        <div class="phrase-romanji" id="cardRomanji">オラ</div>
      </div>
      <div class="face back">
        <div class="phrase-jp" id="cardJp">こんにちは</div>
        <div class="example" id="cardExample">例: Olá, como vai? ／ こんにちは、元気ですか？</div>
      </div>
    </div>
  </div>

  <p class="tap-hint">タップでめくる · スワイプで次へ</p>

  <div class="nav-row">
    <button class="btn" onclick="prevCard()">← 前へ</button>
    <button class="btn primary" onclick="nextCard()">次へ →</button>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="markLearned()">✓ 覚えた</button>
    <button class="btn" onclick="speakPhrase()">🔊 発音</button>
  </div>
</div>

<!-- QUIZ VIEW -->
<div class="view" id="view-quiz">
  <div style="height:14px"></div>
  <div id="quizArea"></div>
</div>

<!-- LIST VIEW -->
<div class="view" id="view-list">
  <div style="height:14px"></div>
  <p class="section-title">全フレーズ (<span id="totalCount">0</span>)</p>
  <div class="phrase-list" id="phraseList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PHRASES = [
  { pt: "Olá", romanji: "オラ", jp: "こんにちは", cat: "あいさつ", example: "Olá, como vai? ／ こんにちは、元気ですか？" },
  { pt: "Bom dia", romanji: "ボン・ジア", jp: "おはようございます", cat: "あいさつ", example: "Bom dia, tudo bem? ／ おはよう、元気？" },
  { pt: "Boa tarde", romanji: "ボア・タルジ", jp: "こんにちは（午後）", cat: "あいさつ", example: "Boa tarde! ／ こんにちは！" },
  { pt: "Boa noite", romanji: "ボア・ノイチ", jp: "こんばんは / おやすみ", cat: "あいさつ", example: "Boa noite! ／ おやすみなさい！" },
  { pt: "Tchau", romanji: "チャオ", jp: "さようなら / バイバイ", cat: "あいさつ", example: "Tchau! Até logo! ／ バイバイ、またね！" },
  { pt: "Até logo", romanji: "アテ・ロゴ", jp: "またあとで", cat: "あいさつ", example: "Até logo! ／ またあとで！" },
  { pt: "Como vai?", romanji: "コモ・ヴァイ", jp: "お元気ですか？", cat: "あいさつ", example: "Oi! Como vai? ／ やあ！元気？" },
  { pt: "Tudo bem", romanji: "トゥード・ベン", jp: "元気です / 大丈夫", cat: "あいさつ", example: "Tudo bem, obrigado! ／ 元気です、ありがとう！" },
  { pt: "Por favor", romanji: "ポル・ファボール", jp: "お願いします", cat: "基本表現", example: "Água, por favor. ／ 水をください。" },
  { pt: "Obrigado / Obrigada", romanji: "オブリガード / オブリガーダ", jp: "ありがとう", cat: "基本表現", example: "Muito obrigado! ／ 本当にありがとう！" },
  { pt: "De nada", romanji: "ジ・ナーダ", jp: "どういたしまして", cat: "基本表現", example: "— Obrigado! — De nada. ／ ありがとう！ どういたしまして。" },
  { pt: "Desculpe", romanji: "デスクルピ", jp: "すみません / ごめんなさい", cat: "基本表現", example: "Desculpe, não entendi. ／ すみません、わかりませんでした。" },
  { pt: "Com licença", romanji: "コン・リセンサ", jp: "失礼します / ちょっとすみません", cat: "基本表現", example: "Com licença, posso passar? ／ 失礼、通れますか？" },
  { pt: "Sim", romanji: "シン", jp: "はい", cat: "基本表現", example: "Sim, claro! ／ はい、もちろん！" },
  { pt: "Não", romanji: "ナォン", jp: "いいえ", cat: "基本表現", example: "Não, obrigado. ／ いいえ、結構です。" },
  { pt: "Meu nome é ...", romanji: "メウ・ノミ・エ", jp: "私の名前は〜です", cat: "自己紹介", example: "Meu nome é Ana. ／ 私の名前はアナです。" },
  { pt: "Sou do Japão", romanji: "ソウ・ド・ジャポン", jp: "日本から来ました", cat: "自己紹介", example: "Sou do Japão, de Tóquio. ／ 東京から来ました。" },
  { pt: "Prazer em conhecer", romanji: "プラゼル・エン・コニェセール", jp: "はじめまして", cat: "自己紹介", example: "Prazer em conhecer você! ／ はじめまして！" },
  { pt: "Falo um pouco de português", romanji: "ファロ・ウン・ポコ・ジ・ポルトゲス", jp: "ポルトガル語を少し話します", cat: "自己紹介", example: "Falo um pouco de português. ／ ポルトガル語を少し話します。" },
  { pt: "A conta, por favor", romanji: "ア・コンタ・ポル・ファボール", jp: "お会計をお願いします", cat: "レストラン", example: "A conta, por favor! ／ お会計お願いします！" },
  { pt: "Quero isso", romanji: "ケーロ・イッソ", jp: "これをください", cat: "レストラン", example: "Quero isso e aquilo. ／ これとあれをください。" },
  { pt: "Está delicioso", romanji: "エスタ・デリシオーゾ", jp: "おいしいです", cat: "レストラン", example: "Está delicioso! ／ とてもおいしい！" },
  { pt: "Mais um, por favor", romanji: "マイス・ウン・ポル・ファボール", jp: "もう一つください", cat: "レストラン", example: "Mais um café, por favor. ／ コーヒーをもう一杯ください。" },
  { pt: "Onde é o banheiro?", romanji: "オンジ・エ・オ・バニェイロ", jp: "トイレはどこですか？", cat: "移動・場所", example: "Com licença, onde é o banheiro? ／ すみません、トイレはどこですか？" },
  { pt: "Como chego a ...?", romanji: "コモ・シェゴ・ア", jp: "〜への行き方は？", cat: "移動・場所", example: "Como chego à praia? ／ ビーチへはどう行きますか？" },
  { pt: "Vire à esquerda / direita", romanji: "ヴィリ・ア・エスケルダ / ジレイタ", jp: "左/右に曲がってください", cat: "移動・場所", example: "Vire à direita na próxima rua. ／ 次の道を右に曲がってください。" },
];

let current = 0;
let flipped = false;
let learned = new Set(JSON.parse(localStorage.getItem('learned') || '[]'));
let starred = new Set(JSON.parse(localStorage.getItem('starred') || '[]'));
let streak = 0;

let touchStartX = 0;
document.getElementById('flashcard').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('flashcard').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { dx < 0 ? nextCard() : prevCard(); }
}, { passive: true });

function saveData() {
  localStorage.setItem('learned', JSON.stringify([...learned]));
  localStorage.setItem('starred', JSON.stringify([...starred]));
}

function updateCard() {
  const p = PHRASES[current];
  document.getElementById('cardCategory').textContent = p.cat;
  document.getElementById('cardPt').textContent = p.pt;
  document.getElementById('cardRomanji').textContent = p.romanji;
  document.getElementById('cardJp').textContent = p.jp;
  document.getElementById('cardExample').textContent = '例: ' + p.example;
  document.getElementById('flashcard').classList.remove('flipped');
  flipped = false;
  updateProgress();
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
  flipped = !flipped;
}

function nextCard() { current = (current + 1) % PHRASES.length; updateCard(); }
function prevCard() { current = (current - 1 + PHRASES.length) % PHRASES.length; updateCard(); }

function markLearned() {
  if (learned.has(current)) {
    learned.delete(current);
    showToast('📋 未学習に戻しました');
    streak = 0;
  } else {
    learned.add(current);
    streak++;
    showToast('✅ 覚えた！');
  }
  document.getElementById('streakCount').textContent = streak + ' 連続正解';
  saveData();
  updateProgress();
  setTimeout(nextCard, 400);
}

function speakPhrase() {
  const utter = new SpeechSynthesisUtterance(PHRASES[current].pt);
  utter.lang = 'pt-BR';
  utter.rate = 0.85;
  speechSynthesis.speak(utter);
}

function updateProgress() {
  const pct = Math.round(learned.size / PHRASES.length * 100);
  document.querySelector('.fill').style.strokeDashoffset = 113 - (113 * pct / 100);
  document.getElementById('progressCount').textContent = pct + '%';
  document.getElementById('totalCount').textContent = PHRASES.length;
}

let quizIndex = 0, quizScore = 0, quizAnswered = false;
const QUIZ_COUNT = 10;

function shuffleArr(a) { return [...a].sort(() => Math.random() - .5); }

function startQuiz() {
  quizIndex = 0;
  quizScore = 0;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= QUIZ_COUNT) {
    area.innerHTML = `
      <div class="quiz-result">
        <div class="score">${quizScore}/${QUIZ_COUNT}</div>
        <p>${quizScore >= 8 ? '素晴らしい！🎉' : quizScore >= 5 ? 'よくできました！👏' : 'もう一度挑戦しよう！💪'}</p>
        <br>
        <button class="btn primary" style="width:100%;margin-top:8px" onclick="startQuiz()">もう一度</button>
      </div>`;
    return;
  }
  const correct = PHRASES[Math.floor(Math.random() * PHRASES.length)];
  let choices = [correct];
  while (choices.length < 4) {
    const r = PHRASES[Math.floor(Math.random() * PHRASES.length)];
    if (!choices.find(c => c.pt === r.pt)) choices.push(r);
  }
  choices = shuffleArr(choices);
  quizAnswered = false;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <p class="section-title">問題 ${quizIndex + 1} / ${QUIZ_COUNT}</p>
      <p class="section-title">スコア: ${quizScore}</p>
    </div>
    <div class="quiz-question">
      <div class="category-tag">${correct.cat}</div>
      <div class="phrase-pt">${correct.pt}</div>
      <div class="phrase-romanji">${correct.romanji}</div>
    </div>
    <div class="choices">
      ${choices.map(c => `<button class="choice" onclick="answerQuiz(this, '${c.pt}', '${correct.pt}')">${c.jp}</button>`).join('')}
    </div>`;
}

function answerQuiz(el, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.choice').forEach(b => {
    const ph = PHRASES.find(p => p.jp === b.textContent);
    if (ph && ph.pt === correct) b.classList.add('correct');
  });
  if (chosen === correct) { el.classList.add('correct'); quizScore++; showToast('⭐ 正解！'); }
  else { el.classList.add('wrong'); showToast('😅 残念...'); }
  quizIndex++;
  setTimeout(renderQuizQuestion, 1200);
}

function renderList() {
  const list = document.getElementById('phraseList');
  let cats = {};
  PHRASES.forEach((p, i) => { if (!cats[p.cat]) cats[p.cat] = []; cats[p.cat].push({ ...p, i }); });
  let html = '';
  for (const [cat, items] of Object.entries(cats)) {
    html += `<p class="section-title" style="margin-top:16px">${cat}</p>`;
    items.forEach(({ pt, jp, romanji, i }) => {
      const s = starred.has(i) ? 'starred' : 'unstarred';
      html += `
        <div class="phrase-item">
          <div class="left">
            <div class="pt">${pt}</div>
            <div class="jp">${romanji} ／ ${jp}</div>
          </div>
          <button class="star-btn ${s}" onclick="toggleStar(${i}, this)">★</button>
        </div>`;
    });
  }
  list.innerHTML = html;
}

function toggleStar(i, el) {
  if (starred.has(i)) { starred.delete(i); el.className = 'star-btn unstarred'; }
  else { starred.add(i); el.className = 'star-btn starred'; showToast('⭐ お気に入りに追加！'); }
  saveData();
}

function switchTab(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'quiz') startQuiz();
  if (id === 'list') renderList();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

updateCard();
renderList();
</script>
</body>
</html>
