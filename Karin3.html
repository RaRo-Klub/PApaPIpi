<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Japanese Practice</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f4f8; color: #333; text-align: center; padding: 20px; }
        .container { background: white; max-width: 600px; margin: 0 auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .phrase-box { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; padding: 20px; border: 2px solid #0056b3; border-radius: 12px; background-color: #f8fbff; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        .hidden-text { display: none; margin-top: 15px; padding: 15px; background: #f1f1f1; border-radius: 10px; font-size: 1.1em; text-align: left; }
        button { background-color: #0056b3; color: white; border: none; padding: 12px 20px; margin: 5px; font-size: 1em; border-radius: 8px; cursor: pointer; -webkit-appearance: none; }
        .mic-btn { background-color: #28a745; font-size: 1.2em; width: 100%; margin-top: 15px; font-weight: bold; }
        .next-btn { background-color: #ff9800; font-weight: bold; margin-top: 25px; width: 100%; }
        #feedback { font-size: 1.1em; font-weight: bold; margin-top: 20px; min-height: 1.5em; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; }
        .score-board { font-size: 1.1em; margin-bottom: 15px; color: #666; font-weight: bold; }
        .label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ CA Japanese Phrase Practice</h2>
    <div class="score-board">Score / Pontszám: <span id="score">0</span></div>
    
    <div class="phrase-box" id="phrase-display">読み込み中...</div>
    
    <div style="display: flex; justify-content: center; flex-wrap: wrap;">
        <button onclick="toggleText('hiragana')">あ/A (Hiragana)</button>
        <button onclick="toggleText('english')">English</button>
        <button onclick="toggleText('hungarian')">Magyar</button>
    </div>

    <div id="hiragana" class="hidden-text"><span class="label">【ひらがな】</span><span id="hira-content"></span></div>
    <div id="english" class="hidden-text"><span class="label">【English】</span><span id="en-content"></span></div>
    <div id="hungarian" class="hidden-text"><span class="label">【Magyar】</span><span id="hu-content"></span></div>

    <button class="mic-btn" onclick="startSpeechRecognition()">🎤 録音してチェック / Kiejtés ellenőrzése</button>
    
    <div id="feedback"></div>

    <button class="next-btn" onclick="nextPhrase()">次のフレーズ / Következő ➔</button>
</div>

<script>
    // フレーズデータ (〇〇を具体的な言葉に置き換えています)
    const phrases = [
        {
            jp: "10時30分発、JAL123便をご利用のお客様にお知らせいたします。",
            hira: "じゅうじさんじゅっぷんはつ、じゃるいちにさんびんをごりようのおきゃくさまにおしらせいたします。",
            en: "Attention passengers flying on JAL flight 123 departing at 10:30.",
            hu: "Tájékoztatjuk a 10:30-kor induló JAL 123-as járat utasait."
        },
        {
            jp: "おはようございます。お座席はどちらでしょうか。",
            hira: "おはようございます。おざせきはどちらでしょうか。",
            en: "Good morning. Where is your seat?",
            hu: "Jó reggelt! Hol van a lefoglalt ülése?"
        },
        {
            jp: "お荷物はお上の棚、または前の座席の下にお入れください。",
            hira: "おにもつはおうえのたな、またはまえのざせきのしたにおいれください。",
            en: "Please place your luggage in the overhead bin or under the seat in front of you.",
            hu: "Kérjük, helyezze csomagját a feje feletti tárolóba vagy az Ön előtti ülés alá."
        },
        {
            jp: "お飲み物はいかがですか？何になさいますか？",
            hira: "おのみものはいかがですか？なんになさいますか？",
            en: "Would you like something to drink? What would you like?",
            hu: "Kér valamilyen italt? Mit hozhatok?"
        },
        {
            jp: "恐れ入りますが、お座席にお戻りください。",
            hira: "おそれいりますが、おざせきにおもどりください。",
            en: "Excuse me, but please return to your seat.",
            hu: "Elnézést, de kérem, térjen vissza a helyére."
        },
        {
            jp: "本日もご搭乗いただき、ありがとうございました。",
            hira: "ほんじつもごとうじょういただき、ありがとうございました。",
            en: "Thank you for flying with us today.",
            hu: "Köszönjük, hogy ma velünk utazott!"
        }
    ];

    let currentIndex = 0;
    let score = 0;

    function loadPhrase() {
        const p = phrases[currentIndex];
        document.getElementById('phrase-display').innerText = p.jp;
        document.getElementById('hira-content').innerText = p.hira;
        document.getElementById('en-content').innerText = p.en;
        document.getElementById('hu-content').innerText = p.hu;
        
        document.getElementById('hiragana').style.display = 'none';
        document.getElementById('english').style.display = 'none';
        document.getElementById('hungarian').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('feedback').className = '';
    }

    function toggleText(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
    }

    function nextPhrase() {
        currentIndex = (currentIndex + 1) % phrases.length;
        loadPhrase();
    }

    function startSpeechRecognition() {
        const feedback = document.getElementById('feedback');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            feedback.innerText = "⚠️ iPhoneのSafariで開いてください。 (Kérjük, használja a Safarit iPhone-on.)";
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false; // iPhoneでの安定性を高める

        feedback.innerText = "🎤 聞いています... (Hallgatom...)";
        feedback.className = "";

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const targetPhrase = phrases[currentIndex].jp;
            
            // 記号を除去して比較
            const cleanTranscript = transcript.replace(/[、。！？\s]/g, "");
            const cleanTarget = targetPhrase.replace(/[、。！？\s]/g, "");

            if (cleanTarget.includes(cleanTranscript) || cleanTranscript.includes(cleanTarget)) {
                feedback.innerHTML = `✅ 正解！(Helyes!): <br>"${transcript}"`;
                feedback.className = "correct";
                score += 10;
                document.getElementById('score').innerText = score;
            } else {
                feedback.innerHTML = `❌ おしい！(Majdnem!): <br>"${transcript}"`;
                feedback.className = "incorrect";
            }
        };

        recognition.onerror = function(event) {
            console.log("Error type: " + event.error);
            if(event.error === 'not-allowed') {
                feedback.innerText = "⚠️ マイクを許可してください。(Engedélyezze a mikrofont!)";
            } else {
                feedback.innerText = "⚠️ エラー: " + event.error + " (Próbálja újra!)";
            }
        };

        try {
            recognition.start();
        } catch (e) {
            feedback.innerText = "⚠️ もう一度ボタンを押してください。";
        }
    }

    window.onload = loadPhrase;
</script>

</body>
</html>
