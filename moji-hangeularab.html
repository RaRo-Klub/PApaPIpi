<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScriptMaster">
<meta name="theme-color" content="#0e0e12">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" id="pwa-icon">
<title>ScriptMaster — 文字マスター</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap');
:root{--bg:#0e0e12;--surface:#16161c;--surface2:#1e1e26;--border:#2a2a36;--text:#f0eef8;--muted:#6b6880;--accent-ko:#7c6bff;--accent-ko-light:#a99bff;--accent-ar:#ff6b6b;--accent-ar-light:#ff9b9b;--success:#4ade80;--fail:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,107,255,0.08) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,107,107,0.06) 0%,transparent 70%);pointer-events:none}
header{border-bottom:1px solid var(--border);padding:.8rem 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,14,18,0.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-size:1rem;font-weight:700;letter-spacing:-.02em}
.logo span{color:var(--accent-ko-light)}
.lang-switcher{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;margin-left:auto}
.lang-btn{padding:.3rem .9rem;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--surface2);color:var(--text)}
.lang-btn.ko.active{color:var(--accent-ko-light)}
.lang-btn.ar.active{color:var(--accent-ar-light)}
.streak-badge{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.3rem .7rem;font-size:.76rem;font-weight:700;color:var(--muted)}
.streak-badge span{color:#fbbf24}
main{max-width:720px;margin:0 auto;padding:1.2rem 1rem 4rem}
.mode-tabs{display:flex;gap:6px;margin-bottom:1.2rem}
.mode-tab{flex:1;padding:.6rem .5rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.mode-tab.active{border-color:var(--accent-ko);color:var(--accent-ko-light);background:rgba(124,107,255,0.1)}
.ar-mode .mode-tab.active{border-color:var(--accent-ar);color:var(--accent-ar-light);background:rgba(255,107,107,0.1)}
.view{display:none}.view.active{display:block}

/* Level selector (Korean only) */
.level-bar{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap}
.level-btn{padding:.38rem .85rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .18s}
.level-btn.active{border-color:var(--accent-ko);color:var(--accent-ko-light);background:rgba(124,107,255,0.12)}

/* Chart */
.chart-section{margin-bottom:1.8rem}
.section-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:7px}
.char-cell{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:.55rem .3rem;text-align:center;cursor:pointer;transition:all .18s;position:relative}
.char-cell:hover{border-color:var(--accent-ko);background:rgba(124,107,255,0.08);transform:translateY(-2px)}
.ar-mode .char-cell:hover{border-color:var(--accent-ar);background:rgba(255,107,107,0.08)}
.char-cell.mastered{border-color:var(--success);background:rgba(74,222,128,0.06)}
.char-big{font-size:1.6rem;line-height:1;margin-bottom:.25rem;display:block;font-family:'Noto Sans KR',sans-serif}
.char-rom{font-size:.6rem;color:var(--muted);font-weight:600}
.char-cell.mastered .char-rom{color:var(--success)}
.mastered-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--success);display:none}
.char-cell.mastered .mastered-dot{display:block}

/* Syllable grid — bigger cells */
.syl-table-wrap{overflow-x:auto;margin-bottom:.8rem}
.syl-table{border-collapse:separate;border-spacing:4px;min-width:500px}
.syl-table th{font-size:.62rem;color:var(--muted);font-weight:700;padding:.3rem .4rem;text-align:center;letter-spacing:.05em}
.syl-cell{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.4rem .3rem;text-align:center;cursor:pointer;transition:all .15s;min-width:52px}
.syl-cell:hover{border-color:var(--accent-ko);background:rgba(124,107,255,0.1);transform:translateY(-1px)}
.syl-cell.mastered{border-color:var(--success);background:rgba(74,222,128,0.06)}
.syl-char{font-size:1.35rem;font-family:'Noto Sans KR',sans-serif;line-height:1;display:block}
.syl-rom{font-size:.58rem;color:var(--muted)}
.syl-cell.mastered .syl-rom{color:var(--success)}

/* Batchim grid */
.bat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px}
.bat-cell{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:.6rem .5rem;cursor:pointer;transition:all .18s;position:relative}
.bat-cell:hover{border-color:var(--accent-ko);background:rgba(124,107,255,0.08);transform:translateY(-2px)}
.bat-cell.mastered{border-color:var(--success);background:rgba(74,222,128,0.06)}
.bat-char{font-size:1.5rem;font-family:'Noto Sans KR',sans-serif;line-height:1;display:block;text-align:center;margin-bottom:.25rem}
.bat-info{text-align:center}
.bat-rom{font-size:.62rem;color:var(--muted);font-weight:600}
.bat-meaning{font-size:.6rem;color:var(--muted);margin-top:.1rem}
.bat-cell.mastered .bat-rom{color:var(--success)}
.bat-cell .mastered-dot{top:4px;right:4px}

/* Arabic */
.ar-char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ar-cell{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.6rem .5rem;cursor:pointer;transition:all .18s;position:relative;display:flex;align-items:center;gap:.5rem}
.ar-cell:hover{border-color:var(--accent-ar);background:rgba(255,107,107,0.08);transform:translateY(-2px)}
.ar-cell.mastered{border-color:var(--success);background:rgba(74,222,128,0.06)}
.ar-char-big{font-size:1.6rem;font-family:'Noto Sans Arabic',sans-serif;line-height:1}
.ar-info{flex:1;min-width:0}
.ar-name{font-size:.65rem;font-weight:700;color:var(--text)}
.ar-rom{font-size:.6rem;color:var(--muted)}
.ar-forms{font-size:.58rem;color:var(--muted);margin-top:.1rem}
.ar-cell.mastered .ar-rom{color:var(--success)}

/* Popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.2rem;opacity:0;pointer-events:none;transition:opacity .2s}
.popup-overlay.show{opacity:1;pointer-events:all}
.popup{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1.5rem;max-width:420px;width:100%;text-align:center;transform:translateY(12px) scale(0.97);transition:transform .25s;max-height:90vh;overflow-y:auto}
.popup-overlay.show .popup{transform:translateY(0) scale(1)}
.popup-char{font-size:5rem;line-height:1;margin-bottom:.4rem;font-family:'Noto Sans KR',sans-serif}
.popup-char.ar{font-family:'Noto Sans Arabic',sans-serif}
.popup-rom{font-size:1.3rem;font-weight:700;margin-bottom:.25rem}
.popup-name{font-size:.8rem;color:var(--muted);margin-bottom:.3rem}
.popup-examples{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem;margin:.8rem 0;text-align:left}
.popup-ex-title{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.popup-ex-item{font-size:.83rem;margin-bottom:.25rem;line-height:1.5}
.popup-ex-item .ex-char{font-size:1.05rem;font-family:'Noto Sans KR',sans-serif}
.popup-ex-item .ex-char.ar{font-family:'Noto Sans Arabic',sans-serif;font-size:1.3rem}
.popup-btn-row{display:flex;gap:8px}
.popup-btn{flex:1;padding:.6rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.popup-btn.primary{border-color:var(--accent-ko);color:var(--accent-ko-light);background:rgba(124,107,255,0.12)}
.ar-mode .popup-btn.primary{border-color:var(--accent-ar);color:var(--accent-ar-light);background:rgba(255,107,107,0.12)}
.popup-btn.close-btn{color:var(--muted)}

/* Flashcard */
.flashcard-wrap{perspective:1000px;margin-bottom:1rem}
.flashcard{background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:2.5rem 2rem;text-align:center;cursor:pointer;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .22s;position:relative}
.flashcard:hover{transform:translateY(-3px)}
.fc-char{font-size:5rem;line-height:1;margin-bottom:.7rem;font-family:'Noto Sans KR',sans-serif}
.fc-char.ar{font-family:'Noto Sans Arabic',sans-serif}
.fc-hint{font-size:.72rem;color:var(--muted)}
.fc-reveal{font-size:1.5rem;font-weight:700;color:var(--accent-ko-light)}
.fc-sublabel{font-size:.75rem;color:var(--muted);margin-top:.25rem}
.ar-mode .fc-reveal{color:var(--accent-ar-light)}
.fc-nav{display:flex;gap:8px;justify-content:center;margin-bottom:.7rem}
.fc-btn{padding:.55rem 1.1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.fc-btn:hover{border-color:var(--accent-ko);color:var(--accent-ko-light)}
.ar-mode .fc-btn:hover{border-color:var(--accent-ar);color:var(--accent-ar-light)}
.fc-counter{text-align:center;font-size:.74rem;color:var(--muted)}

/* Quiz */
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.8rem 1.5rem;text-align:center;margin-bottom:1rem}
.quiz-progress-bar{background:var(--border);border-radius:100px;height:5px;margin-bottom:1.5rem;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--accent-ko);border-radius:100px;transition:width .5s}
.ar-mode .quiz-progress-fill{background:var(--accent-ar)}
.quiz-char-display{font-size:5.5rem;line-height:1;margin-bottom:.8rem;font-family:'Noto Sans KR',sans-serif}
.quiz-char-display.ar{font-family:'Noto Sans Arabic',sans-serif}
.quiz-prompt{font-size:.8rem;color:var(--muted);margin-bottom:1.3rem}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.quiz-option{padding:.85rem;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Noto Sans KR','Space Grotesk',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .18s;line-height:1.3}
.quiz-option:hover:not(:disabled){border-color:var(--accent-ko);background:rgba(124,107,255,0.1)}
.ar-mode .quiz-option:hover:not(:disabled){border-color:var(--accent-ar);background:rgba(255,107,107,0.1)}
.quiz-option.correct{border-color:var(--success);background:rgba(74,222,128,0.12);color:var(--success)}
.quiz-option.wrong{border-color:var(--fail);background:rgba(248,113,113,0.1);color:var(--fail)}
.quiz-option:disabled{cursor:default}
.quiz-feedback{min-height:2.5rem;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;margin-bottom:.5rem}
.quiz-stats{display:flex;gap:8px;margin-bottom:1rem}
.quiz-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem;text-align:center}
.quiz-stat-num{font-size:1.2rem;font-weight:700}
.quiz-stat-label{font-size:.65rem;color:var(--muted)}

.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.btn:hover{opacity:.8}
.btn-primary{border-color:var(--accent-ko);color:var(--accent-ko-light);background:rgba(124,107,255,0.12)}
.ar-mode .btn-primary{border-color:var(--accent-ar);color:var(--accent-ar-light);background:rgba(255,107,107,0.12)}

#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.7rem 1.2rem;font-size:.84rem;font-weight:600;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.good{border-color:var(--success);color:var(--success)}
#toast.bad{border-color:var(--fail);color:var(--fail)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.pop{animation:pop .2s ease}
</style>
</head>
<body>
<header>
  <div class="logo">Script<span>Master</span></div>
  <div class="lang-switcher">
    <button class="lang-btn ko active" onclick="setLang('ko')">🇰🇷 한글</button>
    <button class="lang-btn ar" onclick="setLang('ar')">🇸🇦 عربي</button>
  </div>
  <div class="streak-badge">🔥 <span id="streak-num">0</span></div>
</header>
<main id="main">
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('chart',this)">📋 一覧</button>
    <button class="mode-tab" onclick="setMode('flash',this)">🃏 暗記</button>
    <button class="mode-tab" onclick="setMode('quiz',this)">✏️ クイズ</button>
  </div>
  <div class="view active" id="view-chart"></div>
  <div class="view" id="view-flash">
    <div id="ko-level-bar-flash" class="level-bar" style="display:none">
      <span style="font-size:.72rem;color:var(--muted);align-self:center;margin-right:.3rem">範囲：</span>
      <button class="level-btn" onclick="setFcLevel('jamo')">字母のみ</button>
      <button class="level-btn active" onclick="setFcLevel('syl')">音節（子＋母）</button>
      <button class="level-btn" onclick="setFcLevel('bat')">パッチム付き</button>
      <button class="level-btn" onclick="setFcLevel('all')">すべて</button>
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="fc-char" id="fc-char"></div>
        <div class="fc-hint" id="fc-hint">タップして読み方を確認</div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" onclick="fcMove(-1)">← 前</button>
      <button class="fc-btn" onclick="fcShuffle()">🔀 シャッフル</button>
      <button class="fc-btn" onclick="fcMove(1)">次 →</button>
    </div>
    <div class="fc-counter" id="fc-counter"></div>
  </div>
  <div class="view" id="view-quiz">
    <div id="ko-level-bar-quiz" class="level-bar" style="display:none">
      <span style="font-size:.72rem;color:var(--muted);align-self:center;margin-right:.3rem">範囲：</span>
      <button class="level-btn" onclick="setQuizLevel('jamo')">字母のみ</button>
      <button class="level-btn active" onclick="setQuizLevel('syl')">音節（子＋母）</button>
      <button class="level-btn" onclick="setQuizLevel('bat')">パッチム付き</button>
      <button class="level-btn" onclick="setQuizLevel('all')">すべて</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog"></div></div>
      <div class="quiz-char-display" id="quiz-char"></div>
      <div class="quiz-prompt" id="quiz-prompt">この文字の読み方は？</div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
    </div>
    <div class="quiz-stats">
      <div class="quiz-stat"><div class="quiz-stat-num" id="q-correct">0</div><div class="quiz-stat-label">✅ 正解</div></div>
      <div class="quiz-stat"><div class="quiz-stat-num" id="q-wrong">0</div><div class="quiz-stat-label">❌ 不正解</div></div>
      <div class="quiz-stat"><div class="quiz-stat-num" id="q-streak">0</div><div class="quiz-stat-label">🔥 連続</div></div>
    </div>
    <div style="text-align:center"><button class="btn btn-primary" onclick="startQuiz()">🔄 リセット</button></div>
  </div>
</main>

<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <div class="popup-char" id="popup-char"></div>
    <div class="popup-rom" id="popup-rom"></div>
    <div class="popup-name" id="popup-name"></div>
    <div class="popup-examples" id="popup-examples"></div>
    <div class="popup-btn-row">
      <button class="popup-btn close-btn" onclick="closePopupDirect()">閉じる</button>
      <button class="popup-btn primary" id="popup-master-btn" onclick="toggleMaster()">⭐ 覚えた！</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ============================================================
// DATA: 字母
// ============================================================
const HANGUL_VOWELS = [
  {char:'ㅏ',rom:'a',name:'ア',type:'jamo',ex:[{char:'아',rom:'a',meaning:'あ'}]},
  {char:'ㅑ',rom:'ya',name:'ヤ',type:'jamo',ex:[{char:'야',rom:'ya',meaning:'やあ！'}]},
  {char:'ㅓ',rom:'eo',name:'オ（後退）',type:'jamo',ex:[{char:'어',rom:'eo',meaning:'えっ？'}]},
  {char:'ㅕ',rom:'yeo',name:'ヨ',type:'jamo',ex:[{char:'여',rom:'yeo',meaning:'はい（女性）'}]},
  {char:'ㅗ',rom:'o',name:'オ（前進）',type:'jamo',ex:[{char:'오',rom:'o',meaning:'五'}]},
  {char:'ㅛ',rom:'yo',name:'ヨ',type:'jamo',ex:[{char:'요',rom:'yo',meaning:'（丁寧語尾）'}]},
  {char:'ㅜ',rom:'u',name:'ウ（前進）',type:'jamo',ex:[{char:'우',rom:'u',meaning:'雨/右'}]},
  {char:'ㅠ',rom:'yu',name:'ユ',type:'jamo',ex:[{char:'유',rom:'yu',meaning:'油'}]},
  {char:'ㅡ',rom:'eu',name:'ウ（後退）',type:'jamo',ex:[{char:'으',rom:'eu',meaning:'（語幹）'}]},
  {char:'ㅣ',rom:'i',name:'イ',type:'jamo',ex:[{char:'이',rom:'i',meaning:'二/歯'}]},
  {char:'ㅐ',rom:'ae',name:'エ',type:'jamo',ex:[{char:'개',rom:'gae',meaning:'犬'}]},
  {char:'ㅔ',rom:'e',name:'エ',type:'jamo',ex:[{char:'네',rom:'ne',meaning:'はい'}]},
  {char:'ㅘ',rom:'wa',name:'ワ',type:'jamo',ex:[{char:'봐',rom:'bwa',meaning:'見る'}]},
  {char:'ㅝ',rom:'wo',name:'ウォ',type:'jamo',ex:[{char:'원',rom:'won',meaning:'ウォン'}]},
  {char:'ㅚ',rom:'oe',name:'ウェ',type:'jamo',ex:[{char:'외',rom:'oe',meaning:'外'}]},
  {char:'ㅟ',rom:'wi',name:'ウィ',type:'jamo',ex:[{char:'쉬',rom:'swi',meaning:'休む'}]},
  {char:'ㅢ',rom:'ui',name:'ウィ',type:'jamo',ex:[{char:'의',rom:'ui',meaning:'の（助詞）'}]},
  {char:'ㅒ',rom:'yae',name:'イェ',type:'jamo',ex:[{char:'얘',rom:'yae',meaning:'この子'}]},
  {char:'ㅖ',rom:'ye',name:'イェ',type:'jamo',ex:[{char:'예',rom:'ye',meaning:'礼/はい'}]},
  {char:'ㅙ',rom:'wae',name:'ウェ',type:'jamo',ex:[{char:'왜',rom:'wae',meaning:'なぜ'}]},
];
const HANGUL_CONSONANTS = [
  {char:'ㄱ',rom:'g/k',name:'キウク',type:'jamo',ex:[{char:'가',rom:'ga',meaning:'行く'}]},
  {char:'ㄴ',rom:'n',name:'ニウン',type:'jamo',ex:[{char:'나',rom:'na',meaning:'私'}]},
  {char:'ㄷ',rom:'d/t',name:'ティグッ',type:'jamo',ex:[{char:'다',rom:'da',meaning:'全部'}]},
  {char:'ㄹ',rom:'r/l',name:'リウル',type:'jamo',ex:[{char:'라',rom:'ra',meaning:'（語尾）'}]},

  {j:'ㄱ',r:'g/k'},{j:'ㄴ',r:'n'},{j:'ㄷ',r:'d'},{j:'ㄹ',r:'r/l'},

  {j:'ㅈ',r:'j'},{j:'ㅊ',r:'ch'},{j:'ㅋ',r:'k'},{j:'ㅌ',r:'t'},
  {j:'ㅍ',r:'p'},{j:'ㅎ',r:'h'},
];
const SYL_VOWS = [
  {j:'ㅏ',r:'a'},{j:'ㅑ',r:'ya'},{j:'ㅓ',r:'eo'},{j:'ㅕ',r:'yeo'},
  {j:'ㅗ',r:'o'},{j:'ㅛ',r:'yo'},{j:'ㅜ',r:'u'},{j:'ㅠ',r:'yu'},
  {j:'ㅡ',r:'eu'},{j:'ㅣ',r:'i'},
];
// 実際の音節文字（Unicode計算）
function makeSyl(ci, vi){
  // 初声index (19種), 中声index (21種)
  const INIT = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const MID  = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const ii = INIT.indexOf(ci);
  const mi = MID.indexOf(vi);
  if(ii<0||mi<0) return '?';
  return String.fromCharCode(0xAC00 + ii*21*28 + mi*28);
}
// 音節データ生成（SYL_CONS×SYL_VOWS）
const SYLLABLES = [];
SYL_CONS.forEach(c => {
  SYL_VOWS.forEach(v => {
    const char = makeSyl(c.j, v.j);
    const rom = (c.r==='（無音）'?'':c.r) + v.r;
    SYLLABLES.push({
      char, rom,
      name: (c.r==='（無音）'?'':c.r)+' + '+v.r,
      con: c.j, conR: c.r, vow: v.j, vowR: v.r,
      type: 'syl',
      ex:[]
    });
  });
});

function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));

  g('view-chart').classList.add('active');

  renderChart();
  buildFcItems();
  renderFlash();
  startQuiz();
}

  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));

function renderKoGrid(gridId,items){

  items.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='char-cell'+(isMastered(item.char)?' mastered':'');
    div.innerHTML=`<div class="mastered-dot"></div><span class="char-big">${item.char}</span><span class="char-rom">${item.rom}</span>`;
    div.onclick=()=>openPopup(item,'ko');
    grid.appendChild(div);

function renderSylTable(){
  const tbl=g('syl-table');
  // header row
  let html='<tr><th></th>';
  SYL_VOWS.forEach(v=>{ html+=`<th>${v.j}<br><span style="color:var(--accent-ko-light)">${v.r}</span></th>`; });
  html+='</tr>';
  SYL_CONS.forEach(c=>{
    html+=`<tr><th style="text-align:right">${c.j}<br><span style="color:var(--accent-ko-light);font-size:.55rem">${c.r}</span></th>`;
    SYL_VOWS.forEach(v=>{
      const char=makeSyl(c.j,v.j);
      const rom=(c.r==='（無音）'?'':c.r)+v.r;
      const isMast=isMastered(char);
      html+=`<td class="syl-cell${isMast?' mastered':''}" onclick="openPopupSyl('${char}','${rom}','${c.j}','${v.j}','${c.r}','${v.r}')">

        <span class="syl-rom">${rom}</span>

    });
    html+='</tr>';
  });
  tbl.innerHTML=html;
}

function openPopupSyl(char,rom,cj,vj,cr,vr){
  const item={char,rom,name:`${cj}(${cr}) + ${vj}(${vr})`,type:'syl',ex:[]};
  openPopup(item,'ko');
}

function openPopup(item,lang){
  popupItem={item,lang};
  const isAr=lang==='ar';
  const charEl=g('popup-char');
  charEl.textContent=item.char;
  charEl.className='popup-char'+(isAr?' ar':'');
  g('popup-rom').textContent=item.rom;

  if(isAr){
    g('popup-name').innerHTML=`<span style="font-size:.92rem;font-weight:700;color:var(--text)">${item.name}</span><br><span style="font-size:.7rem;color:var(--muted)">${item.nameJP}</span>`;
  } else if(item.type==='syl'){
    // 音節の説明
    g('popup-name').innerHTML=`<span style="font-size:.85rem;color:var(--muted)">組み合わせ：</span><span style="font-size:.9rem;font-weight:700"> ${item.name}</span>`;
  } else if(item.type==='bat'||item.type==='bat4'){
    g('popup-name').innerHTML=`<span style="font-size:.85rem;font-weight:700">${item.meaning}</span><br><span style="font-size:.74rem;color:var(--muted)">パッチム: <b style="color:var(--accent-ko-light)">${item.batchim}</b>（${item.batRom}）${item.type==='bat4'?' 〔複合パッチム〕':''}</span>`;
  } else {
    g('popup-name').textContent=item.name;
  }

  const masKey=mastKey(lang,item.char);
  const btn=g('popup-master-btn');
  btn.textContent=mastered[masKey]?'✅ 覚えた済み':'⭐ 覚えた！';

  let exHtml='';
  if(isAr){
    if(item.note){
      exHtml+=`<div style="background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);border-radius:8px;padding:.5rem .7rem;margin-bottom:.6rem;font-size:.76rem;color:var(--accent-ar-light)">💡 ${item.note}</div>`;
    }
    exHtml+=`
      <div class="popup-ex-title" style="margin-bottom:.4rem">📝 字形（位置による変化）</div>
      <table style="width:100%;border-collapse:separate;border-spacing:4px;margin-bottom:.7rem;direction:rtl;text-align:center">
        <tr>
          ${['語頭','語中','語末','独立'].map((label,i)=>{
            const forms=[item.f1,item.f2,item.f3,item.f4];
            const notes=['←接続',item.connected?'両側接続':'※右のみ','右→','単体'];
            return `<td style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:.35rem .2rem">
              <div style="font-family:'Noto Sans Arabic',sans-serif;font-size:1.8rem;line-height:1">${forms[i]}</div>
              <div style="font-size:.58rem;color:var(--muted);margin-top:.15rem">${label}</div>
              <div style="font-size:.58rem;color:var(--accent-ar-light)">${notes[i]}</div>
            </td>`;
          }).join('')}
        </tr>
      </table>
    `;
  }

  if(item.ex && item.ex.length){
    exHtml+=`<div class="popup-ex-title">例単語</div>`;
    item.ex.forEach(e=>{
      exHtml+=`<div class="popup-ex-item"><span class="ex-char${isAr?' ar':''}">${e.char}</span> /${e.rom}/ — ${e.meaning}</div>`;
    });
  } else if(item.type==='syl'){
    exHtml+=`<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:.5rem">音節単体の例は暗記・クイズで練習しましょう</div>`;
  }

  g('popup-examples').innerHTML=exHtml;
  g('popup-overlay').classList.add('show');
}

function toggleMaster(){
  if(!popupItem) return;
  const {item,lang}=popupItem;
  const key=mastKey(lang,item.char);
  const btn=g('popup-master-btn');
  if(mastered[key]){
    delete mastered[key];
    btn.textContent='⭐ 覚えた！';
    showToast('リセットしました');
  } else {
    mastered[key]=true;
    btn.textContent='✅ 覚えた済み';
    streak++;
    g('streak-num').textContent=streak;
    localStorage.setItem('sm_streak',streak);
    showToast('🎉 覚えた！','good');
  }
  localStorage.setItem('sm_mastered',JSON.stringify(mastered));
  renderChart();
}

function closePopup(e){if(e.target===g('popup-overlay'))closePopupDirect()}
function closePopupDirect(){g('popup-overlay').classList.remove('show')}

function buildFcItems(){
  if(currentLang==='ar'){
    fcItems=[...ARABIC_LETTERS].sort(()=>Math.random()-.5);
  } else {
    fcItems=[...getKoItems(koFcLevel)].sort(()=>Math.random()-.5);
  }
  fcIdx=0; fcFlipped=false;
}

function renderFlash(){
  if(!fcItems.length) buildFcItems();
  const item=fcItems[fcIdx%fcItems.length];
  const charEl=g('fc-char');
  charEl.textContent=item.char;
  charEl.className='fc-char'+(currentLang==='ar'?' ar':'');
  g('fc-hint').className='fc-hint';
  g('fc-hint').textContent='タップして読み方を確認';
  fcFlipped=false;
  g('fc-counter').textContent=(fcIdx%fcItems.length+1)+' / '+fcItems.length;
}

function flipCard(){
  const item=fcItems[fcIdx%fcItems.length];
  fcFlipped=!fcFlipped;
  const hintEl=g('fc-hint');
  if(fcFlipped){
    const fc=g('flashcard');
    fc.classList.add('pop');
    setTimeout(()=>fc.classList.remove('pop'),200);
    hintEl.className='';
    let sub='';
    if(item.type==='syl') sub=`<div class="fc-sublabel">組み合わせ: ${item.name}</div>`;
    else if(item.type==='bat'||item.type==='bat4') sub=`<div class="fc-sublabel">${item.meaning}　パッチム: ${item.batchim}(${item.batRom})</div>`;
    else sub=`<div class="fc-sublabel">${item.name}</div>`;
    hintEl.innerHTML=`<div class="fc-reveal">${item.rom}</div>${sub}`;
  } else {
    hintEl.className='fc-hint';
    hintEl.textContent='タップして読み方を確認';
  }
}

function fcMove(dir){
  fcIdx=((fcIdx+dir)%fcItems.length+fcItems.length)%fcItems.length;
  renderFlash();
}
function fcShuffle(){
  buildFcItems();
  showToast('🔀 シャッフルしました');
}

// QUIZ

function startQuiz(){
  let pool;
  if(currentLang==='ar'){
    pool=ARABIC_LETTERS;
  } else {
    pool=getKoItems(koQuizLevel);
  }
  quizItems=[...pool].sort(()=>Math.random()-.5);
  quizIdx=0; qCorrect=0; qWrong=0; qStreak=0;
  updateQuizStats();
  renderQuiz();
}

function renderQuiz(){
  const pool=currentLang==='ar'?ARABIC_LETTERS:getKoItems(koQuizLevel);
  if(quizIdx>=quizItems.length){
    g('quiz-char').textContent='🎉';
    g('quiz-char').className='quiz-char-display';
    g('quiz-options').innerHTML=`<div style="grid-column:1/-1;text-align:center;font-size:.9rem;color:var(--muted)">全問完了！リセットしてもう一度</div>`;
    g('quiz-feedback').textContent='';
    g('quiz-prog').style.width='100%';
    return;
  }
  const current=quizItems[quizIdx];
  g('quiz-prog').style.width=(quizIdx/quizItems.length*100).toFixed(0)+'%';
  const charEl=g('quiz-char');
  charEl.textContent=current.char;
  charEl.className='quiz-char-display'+(currentLang==='ar'?' ar':'');
  g('quiz-feedback').textContent='';

  // promptテキスト
  let promptText='この文字の読み方は？';
  if(current.type==='syl') promptText='この音節の読み方は？（初声＋中声）';
  else if(current.type==='bat'||current.type==='bat4') promptText='このパッチム付き文字の読み方は？';
  g('quiz-prompt').textContent=promptText;

  // 選択肢4つ（同じtype系から優先選択）
  const sameType=pool.filter(i=>i.char!==current.char&&(currentLang==='ar'||i.type===current.type));
  const otherType=pool.filter(i=>i.char!==current.char&&i.type!==current.type);
  const decoys=[...sameType,...otherType].sort(()=>Math.random()-.5).slice(0,3);
  const options=[current,...decoys].sort(()=>Math.random()-.5);

  const optEl=g('quiz-options');
  optEl.innerHTML='';
  options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='quiz-option';
    // 音節の場合はrom表示のみ
    if(opt.type==='syl'){
      btn.textContent=opt.rom;
    } else if(opt.type==='bat'||opt.type==='bat4'){
      btn.innerHTML=`${opt.rom}<br><span style="font-size:.72rem;color:var(--muted)">${opt.meaning}</span>`;
    } else {
      btn.textContent=opt.rom+(opt.name?' ('+opt.name+')':'');
    }
    btn.dataset.correct=(opt.char===current.char)?'1':'0';
    btn.dataset.rom=current.rom;
    btn.onclick=()=>answerQuiz(opt.char===current.char,btn,current.rom);
    optEl.appendChild(btn);
  });
}

function answerQuiz(correct,clickedBtn,correctRom){
  document.querySelectorAll('.quiz-option').forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==='1') b.classList.add('correct');
  });
  if(correct){
    clickedBtn.classList.add('correct');
    qCorrect++; qStreak++;
    g('quiz-feedback').textContent='✅ 正解！';
    g('quiz-feedback').style.color='var(--success)';
    if(!mastered[mastKey(currentLang,quizItems[quizIdx].char)]){
      mastered[mastKey(currentLang,quizItems[quizIdx].char)]=true;
      localStorage.setItem('sm_mastered',JSON.stringify(mastered));
      streak++;
      g('streak-num').textContent=streak;
      localStorage.setItem('sm_streak',streak);
    }
  } else {
    clickedBtn.classList.add('wrong');
    qWrong++; qStreak=0;
    g('quiz-feedback').textContent='❌ 不正解 → 正解: '+correctRom;
    g('quiz-feedback').style.color='var(--fail)';
  }
  updateQuizStats();
  setTimeout(()=>{quizIdx++;renderQuiz();},1200);
}

function updateQuizStats(){
  g('q-correct').textContent=qCorrect;
  g('q-wrong').textContent=qWrong;
  g('q-streak').textContent=qStreak;
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // バナーを少し遅らせて表示
  setTimeout(showInstallBanner, 2000);
});

function showInstallBanner(){
  if(!deferredPrompt) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1e1e26;border:1px solid #7c6bff;border-radius:14px;padding:.8rem 1.2rem;display:flex;align-items:center;gap:.8rem;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:340px;width:90%';
  banner.innerHTML = `
    <span style="font-size:1.3rem">📲</span>
    <div style="flex:1">
      <div style="font-size:.82rem;font-weight:700;color:#f0eef8">ホーム画面に追加</div>
      <div style="font-size:.7rem;color:#6b6880">アプリとして使えます</div>
    </div>
    <button onclick="doInstall()" style="background:#7c6bff;color:#fff;border:none;border-radius:8px;padding:.4rem .8rem;font-size:.78rem;font-weight:700;cursor:pointer">追加</button>
    <button onclick="this.closest('#install-banner').remove()" style="background:none;border:none;color:#6b6880;font-size:1rem;cursor:pointer">✕</button>
  `;
  document.body.appendChild(banner);
}

function doInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if(b) b.remove();
  });
}

window.addEventListener('load', () => {

  if(isIos && !isInStandalone){
    setTimeout(() => {
      const tip = document.createElement('div');
      tip.style.cssText = 'position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1e1e26;border:1px solid #ff9b9b;border-radius:14px;padding:.9rem 1.2rem;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:320px;width:90%;text-align:center';
      tip.innerHTML = `
        <div style="font-size:.85rem;font-weight:700;color:#f0eef8;margin-bottom:.4rem">📲 iPhoneでアプリとして使う</div>
        <div style="font-size:.76rem;color:#a99bff;line-height:1.6">
          Safariで開いて<br>
          <b style="color:#f0eef8">［共有 □↑］→「ホーム画面に追加」</b><br>
          をタップしてください
        </div>
        <button onclick="this.parentElement.remove()" style="margin-top:.6rem;background:none;border:1px solid #2a2a36;border-radius:7px;color:#6b6880;font-size:.76rem;padding:.3rem .8rem;cursor:pointer">閉じる</button>
      `;
      document.body.appendChild(tip);
    }, 2000);
  }
});


</script>
